name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Install dependencies (all extras needed for full test suite)
        run: uv sync --all-extras

      - name: Audit Python dependencies for known vulnerabilities
        run: uv run pip-audit --desc --skip-editable

      - name: Run Bandit security linter
        run: uv run bandit -r src -c pyproject.toml -q

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run CI quality gate
        run: make ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Capture build metadata
        id: meta
        run: |
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image smoke test
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: fastapi-chassis:ci
          cache-from: type=gha,scope=fastapi-chassis-ci
          cache-to: type=gha,mode=max,scope=fastapi-chassis-ci
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            REPOSITORY_URL=https://github.com/${{ github.repository }}
            VCS_REF=${{ github.sha }}
            VERSION=ci-${{ github.sha }}

      - name: Report Docker image size
        run: |
          size_bytes="$(docker image inspect fastapi-chassis:ci --format '{{.Size}}')"
          size_mib="$(SIZE_BYTES="${size_bytes}" python - <<'PY'
          import os
          print(f"{int(os.environ['SIZE_BYTES']) / 1024 / 1024:.1f} MiB")
          PY
          )"
          {
            echo "## Docker image benchmark"
            echo
            echo "- Tag: \`fastapi-chassis:ci\`"
            echo "- Uncompressed size: ${size_mib}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test built container runtime
        run: |
          container_name="fastapi-chassis-ci-smoke"
          trap 'docker rm -f "${container_name}" >/dev/null 2>&1 || true' EXIT

          docker run -d \
            --name "${container_name}" \
            -p 18080:8000 \
            -e APP_HOST=0.0.0.0 \
            -e APP_PORT=8000 \
            -e RUN_DB_MIGRATIONS=true \
            -e UVICORN_WORKERS=1 \
            fastapi-chassis:ci

          python - <<'PY'
          import time
          import urllib.error
          import urllib.request

          deadline = time.time() + 90
          last_error = None
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen("http://127.0.0.1:18080/ready", timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception as exc:  # pragma: no cover - CI smoke script
                  last_error = exc
                  time.sleep(2)

          raise SystemExit(f"Container did not become ready: {last_error}")
          PY

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: fastapi-chassis:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  prodlike-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fastapi_chassis
          POSTGRES_USER: fastapi
          POSTGRES_PASSWORD: fastapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fastapi -d fastapi_chassis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Install dependencies (with postgres and redis extras)
        run: uv sync --extra postgres --extra redis

      - name: Run integration tests against Postgres and Redis
        env:
          TEST_POSTGRES_URL: postgresql+asyncpg://fastapi:fastapi@127.0.0.1:5432/fastapi_chassis
          TEST_POSTGRES_ALEMBIC_URL: postgresql+psycopg://fastapi:fastapi@127.0.0.1:5432/fastapi_chassis
          TEST_REDIS_URL: redis://127.0.0.1:6379/0
        run: uv run pytest tests/integration -m integration

      - name: Run production-like stack verification
        env:
          VERIFY_STACK_DATABASE_URL: postgresql+asyncpg://fastapi:fastapi@127.0.0.1:5432/fastapi_chassis
          VERIFY_STACK_ALEMBIC_DATABASE_URL: postgresql+psycopg://fastapi:fastapi@127.0.0.1:5432/fastapi_chassis
          VERIFY_STACK_REDIS_URL: redis://127.0.0.1:6379/1
          VERIFY_STACK_AUTH_MODE: jwks
        run: uv run python ops/test_stack.py
