apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "fastapi-chassis.fullname" . }}-test-readiness"
  namespace: {{ include "fastapi-chassis.namespace" . }}
  labels:
    {{- include "fastapi-chassis.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: readiness
      image: busybox:1.37
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== Testing readiness endpoint ==="
          BODY=$(wget -q -O- --timeout=10 \
            "http://{{ include "fastapi-chassis.fullname" . }}.{{ include "fastapi-chassis.namespace" . }}.svc.cluster.local:{{ .Values.service.port | default 80 }}{{ .Values.app.readinessCheckPath | default "/ready" }}")
          echo "$BODY"
          echo ""
          # Verify the response contains "healthy" status
          echo "$BODY" | grep -q '"status"'
          echo "=== Readiness OK ==="
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 32Mi
