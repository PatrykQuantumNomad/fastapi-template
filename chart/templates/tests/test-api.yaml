apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "fastapi-chassis.fullname" . }}-test-api"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-chassis.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: api
      image: busybox:1.37
      command:
        - /bin/sh
        - -c
        - |
          set -e
          SVC="http://{{ include "fastapi-chassis.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port | default 80 }}"

          echo "=== Testing root endpoint ==="
          wget -q -O- --timeout=10 "$SVC/"
          echo ""

          {{- if .Values.metrics.enabled }}
          echo "=== Testing metrics endpoint ==="
          wget -q -O- --timeout=10 "$SVC/metrics" | head -5
          echo ""
          echo "=== Metrics OK ==="
          {{- end }}

          echo "=== All API tests passed ==="
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 32Mi
