apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "fastapi-chassis.fullname" . }}-test-health"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-chassis.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: healthcheck
      image: busybox:1.37
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== Testing healthcheck endpoint ==="
          wget -q -O- --timeout=10 \
            "http://{{ include "fastapi-chassis.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port | default 80 }}{{ .Values.app.healthCheckPath | default "/healthcheck" }}"
          echo ""
          echo "=== Healthcheck OK ==="
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 32Mi
