groups:
  - name: fastapi-chassis
    rules:
      - alert: FastAPIHigh5xxRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_requests_total[5m])), 0.001)
          > 0.05
        for: 10m
        labels:
          severity: critical
          service: fastapi-chassis
        annotations:
          summary: High 5xx error rate
          description: More than 5% of requests are returning 5xx responses.

      - alert: FastAPIHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: fastapi-chassis
        annotations:
          summary: Elevated p95 latency
          description: 95th percentile request latency has exceeded 1 second.

      - alert: FastAPIReadinessFailures
        expr: |
          sum(rate(http_requests_total{path="/ready",status="503"}[5m])) > 0
        for: 5m
        labels:
          severity: critical
          service: fastapi-chassis
        annotations:
          summary: Readiness endpoint failing
          description: Readiness checks are returning HTTP 503 responses.

      - alert: FastAPIRateLimitSpike
        expr: |
          sum(rate(http_requests_total{status="429"}[5m])) > 1
        for: 10m
        labels:
          severity: warning
          service: fastapi-chassis
        annotations:
          summary: Rate limit rejections increasing
          description: HTTP 429 responses are occurring more than once per second.
